<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cozy Pixel Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2c272e;
            --ui-bg: #4a3e47;
            --accent: #d89f87;
        }

        body {
            font-family: 'VT323', monospace;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            font-size: 1.2rem;
        }

        /* Scanline effect for cozy retro vibe */
        .scanlines::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 50;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* UI Elements */
        .cafe-btn {
            background: var(--accent);
            color: #2c272e;
            border: 4px solid #b67d65;
            border-radius: 8px;
            font-size: 1.5rem;
            text-shadow: none;
            transition: transform 0.1s, background 0.1s;
            box-shadow: 0 4px 0 #8c5d4b;
        }
        .cafe-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #8c5d4b;
        }
        .cafe-btn:hover {
            background: #e8b19a;
        }

        .cafe-input {
            background: #1e1a1f;
            border: 4px solid var(--ui-bg);
            color: #fff;
            border-radius: 8px;
            font-family: 'VT323', monospace;
        }
        .cafe-input:focus {
            border-color: var(--accent);
            outline: none;
        }

        /* Chat Input Field */
        #chat-bar {
            background: rgba(44, 39, 46, 0.9);
            border-top: 4px solid var(--ui-bg);
            backdrop-filter: blur(4px);
        }

        /* Canvas scaling */
        #game-container {
            background-color: #000;
        }
        canvas {
            image-rendering: pixelated;
        }

        /* Floating Chat Icon */
        #floating-chat-btn {
            background: var(--accent);
            color: #2c272e;
            border: 4px solid #b67d65;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 0 #8c5d4b;
            transition: transform 0.1s;
            z-index: 40;
        }
        #floating-chat-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #8c5d4b;
        }

        /* Toast */
        #toast {
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            font-size: 1.2rem;
            top: calc(2rem + env(safe-area-inset-top));
        }

        /* Mobile Viewport & Safe Areas */
        body {
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* Dynamic viewport height to account for mobile browser UI */
            width: 100vw;
            overflow: hidden; /* Prevents pull-to-refresh and bounce */
        }

        #menu-ui, #game-ui {
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

    </style>
</head>
<body class="scanlines flex flex-col items-center justify-center relative bg-[#2c272e]">

    <!-- Toast Notification -->
    <div id="toast" class="absolute left-1/2 transform -translate-x-1/2 -translate-y-4 opacity-0 bg-white text-[#2c272e] px-6 py-2 rounded-xl shadow-lg z-50 border-4 border-[#d89f87]">
        Notification
    </div>

    <!-- Error Dialog Overlay -->
    <div id="dialog-overlay" class="hidden absolute inset-0 bg-black/60 z-50 items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#4a3e47] border-4 border-[#6a5a65] p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <h2 class="text-3xl text-[#d89f87] mb-4">Table Not Found</h2>
            <p id="dialog-msg" class="text-xl text-[#a89f91] mb-6">The room code is invalid or the table has been closed.</p>
            <button onclick="closeDialog()" class="cafe-btn px-6 py-2 text-xl w-full">Okay</button>
        </div>
    </div>

    <!-- Main Menu UI -->
    <div id="menu-ui" class="absolute inset-0 flex flex-col items-center justify-center z-40 bg-[#2c272e]/90 backdrop-blur-sm overflow-y-auto py-4">
        <div class="bg-[#4a3e47] p-6 md:p-8 rounded-2xl border-4 border-[#6a5a65] max-w-md w-full mx-4 shadow-2xl flex flex-col items-center my-auto">
            <h1 class="text-4xl md:text-6xl text-center text-[#d89f87] mb-2 drop-shadow-md">
                Cozy Cafe
            </h1>
            <p class="text-[#a89f91] mb-4 md:mb-6 text-center text-lg md:text-xl">A little pixel lobby to chat with friends.</p>
            
            <div id="loading-indicator" class="text-[#d89f87] animate-pulse text-xl md:text-2xl mb-4">Brewing connection...</div>

            <div id="menu-controls" class="hidden flex-col items-center space-y-3 md:space-y-4 w-full">
                
                <!-- Character Preview -->
                <div class="flex flex-col items-center justify-center bg-[#2c272e] border-4 border-[#6a5a65] rounded-xl p-2 md:p-3 w-full">
                    <canvas id="previewCanvas" width="64" height="64" class="block" style="image-rendering: pixelated;"></canvas>
                    <div id="color-picker" class="flex gap-2 mt-2 flex-wrap justify-center">
                        <!-- Colors inserted via JS -->
                    </div>
                </div>

                <input type="text" id="username-input" placeholder="ENTER USERNAME" maxlength="12" class="cafe-input w-full p-2 md:p-3 text-center text-xl md:text-2xl uppercase">
                <button id="btn-create-room" onclick="createRoom()" class="cafe-btn w-full py-2 md:py-3 text-lg md:text-xl">Open a New Table</button>
                
                <div class="flex items-center w-full space-x-4 py-1 md:py-2">
                    <div class="h-1 bg-[#6a5a65] flex-1 rounded"></div>
                    <span class="text-lg md:text-xl text-[#a89f91]">OR</span>
                    <div class="h-1 bg-[#6a5a65] flex-1 rounded"></div>
                </div>

                <div class="w-full flex flex-col space-y-2 md:space-y-3">
                    <input type="text" id="join-code" placeholder="ENTER 4-LETTER CODE" maxlength="4" class="cafe-input w-full p-2 md:p-3 text-center text-xl md:text-2xl uppercase">
                    <button id="btn-join-room" onclick="joinRoomFromInput()" class="cafe-btn w-full py-2 md:py-3 text-lg md:text-xl bg-[#8fb3a0] border-[#6b8c7a] shadow-[0_4px_0_#506e5e]">Join Friends</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game HUD -->
    <div id="game-ui" class="hidden absolute inset-0 flex-col z-30 pointer-events-none">
        
        <!-- Top Bar -->
        <div class="flex justify-between items-start p-2 md:p-4 w-full pointer-events-auto">
            <div class="bg-[#4a3e47]/90 border-4 border-[#6a5a65] p-2 md:p-3 rounded-xl shadow-lg flex flex-col gap-1 md:gap-2">
                <div class="text-[#a89f91] text-base md:text-xl">Room Code: <span id="display-room-code" class="text-white font-bold text-lg md:text-2xl">----</span></div>
                <button onclick="copyInviteLink()" class="cafe-btn px-2 py-1 md:px-3 md:py-1 text-sm md:text-lg" style="box-shadow: 0 2px 0 #8c5d4b;">Copy Link</button>
            </div>
            
            <div class="flex flex-col gap-2 items-end">
                <!-- Status & Ping -->
                <div class="bg-[#4a3e47]/90 border-4 border-[#6a5a65] p-2 md:p-3 rounded-xl shadow-lg flex flex-col items-end gap-1">
                    <div class="text-base md:text-xl flex items-center gap-2">
                        <div id="conn-indicator" class="w-2 h-2 md:w-3 md:h-3 bg-yellow-400 rounded-full animate-pulse"></div>
                        <span id="conn-status" class="text-white">Connecting...</span>
                    </div>
                    <div class="text-xs md:text-sm text-[#a89f91] flex gap-3">
                        <span id="online-count">1 Online</span>
                        <span>|</span>
                        <span id="ping-value">Ping: -- ms</span>
                    </div>
                </div>
                <!-- Leave Button -->
                <button id="leave-room-btn" onclick="leaveRoom()" class="pointer-events-auto cafe-btn bg-[#c47272] border-[#9a5454] px-3 py-1 md:px-4 md:py-2 text-sm md:text-xl" style="box-shadow: 0 4px 0 #7a3c3c;">Leave</button>
            </div>
        </div>
        
        <!-- Floating Controls (Mobile & Desktop) -->
        <div id="floating-controls" class="absolute bottom-4 left-4 right-4 pointer-events-none flex flex-col items-end justify-end gap-3" style="z-index:40;">
            
            <!-- Chat Form (Floating) -->
            <div id="chat-bar" class="hidden pointer-events-auto bg-[#4a3e47]/90 border-4 border-[#6a5a65] p-2 rounded-xl shadow-lg w-full max-w-sm mb-1 md:mb-2" style="backdrop-filter: blur(4px);">
                <form onsubmit="handleChatSubmit(event)" class="flex w-full gap-2">
                    <input type="text" id="chat-input" placeholder="Say something nice..." maxlength="50" autocomplete="off" class="cafe-input flex-1 p-2 text-base md:text-xl" onfocus="window.isTyping = true" onblur="window.isTyping = false">
                    <button type="submit" class="cafe-btn px-3 py-1 md:px-4 md:py-1 text-base md:text-xl">Chat</button>
                </form>
            </div>

            <div class="flex items-end justify-between w-full">
                <div id="joystick-zone" class="pointer-events-auto md:hidden" style="width: 120px; height: 120px; position: relative;"></div>
                <div class="flex-1"></div>
                <button id="floating-chat-btn" class="pointer-events-auto ml-auto" onclick="toggleChat()">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="#2c272e" xmlns="http://www.w3.org/2000/svg" style="image-rendering: pixelated;">
                        <path d="M2 4h20v12H10l-4 4v-4H2V4z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Canvas -->
    <div id="game-container" class="absolute inset-0 z-10 flex items-center justify-center">
        <canvas id="gameCanvas" width="800" height="600" class="max-w-full max-h-full w-full h-full object-contain"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global variables setup
        window.appId = typeof __app_id !== 'undefined' ? __app_id : 'cozy-cafe-local';
        const firebaseConfig = {
            apiKey: "AIzaSyCKykbYKooqw2a-sKc6URdToA9G6MGLU_Y",
            authDomain: "cozy-cafe-4d076.firebaseapp.com",
            projectId: "cozy-cafe-4d076",
            storageBucket: "cozy-cafe-4d076.firebasestorage.app",
            messagingSenderId: "966046310844",
            appId: "1:966046310844:web:dabb171634ad80bad4cbb9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Game State Variables
        let currentUser = null;
        let currentRoom = null;
        let unsubscribeRoom = null;
        
        let gameState = { players: {} };

        // Pastel cozy colors for players
        const PLAYER_COLORS = ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#e0baff', '#ffbaf2'];
        let selectedColor = PLAYER_COLORS[Math.floor(Math.random() * PLAYER_COLORS.length)];
        let previewIdleOffset = Math.random() * Math.PI * 2;
        let previewLoopId = null;
        
        let localPlayer = {
            x: 400,
            y: 400,
            color: selectedColor,
            msg: "",
            msgTime: 0,
            lastSeen: 0,
            username: "",
            vx: 0,
            vy: 0
        };

        // Canvas & Engine variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const PLAYER_SIZE = 32;
        const SPEED = 4;

        // Input state
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };
        let gameLoopId = null;
        let networkSyncId = null;
        window.isTyping = false; // Prevent WASD movement while typing
        
        let joystickVector = { x: 0, y: 0 };
        let nippleManager = null;
        const clientState = {}; // Interpolation state per UID

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                showToast("Failed to connect to cafe servers.");
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loading-indicator').classList.add('hidden');
                document.getElementById('menu-controls').classList.remove('hidden');
                document.getElementById('menu-controls').classList.add('flex');
                
                initColorPicker();

                // Check if opened via share link
                const urlParams = new URLSearchParams(window.location.search);
                const roomFromUrl = urlParams.get('room');
                if (roomFromUrl && roomFromUrl.length === 4) {
                    document.getElementById('join-code').value = roomFromUrl.toUpperCase();
                    // Optional: we can't join automatically here because they need a username first.
                }
            }
        });

        initAuth();

        function generateRoomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let code = '';
            for(let i=0; i<4; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            return code;
        }

        function getRoomRef(roomCode) {
            // Strict path rule enforcement
            return doc(db, 'artifacts', window.appId, 'public', 'data', 'cafe_rooms', roomCode);
        }

        function initColorPicker() {
            const container = document.getElementById('color-picker');
            container.innerHTML = '';
            PLAYER_COLORS.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `w-8 h-8 rounded-md border-4 ${color === selectedColor ? 'border-white scale-110' : 'border-[#6a5a65]'} transition-transform`;
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    selectedColor = color;
                    localPlayer.color = color;
                    Array.from(container.children).forEach(c => {
                        c.classList.remove('border-white', 'scale-110');
                        c.classList.add('border-[#6a5a65]');
                    });
                    btn.classList.add('border-white', 'scale-110');
                    btn.classList.remove('border-[#6a5a65]');
                };
                container.appendChild(btn);
            });
            startPreviewLoop();
        }

        function startPreviewLoop() {
            const pCanvas = document.getElementById('previewCanvas');
            if (!pCanvas) return;
            const pCtx = pCanvas.getContext('2d');
            
            function loop() {
                if (currentRoom) {
                    cancelAnimationFrame(previewLoopId);
                    return; 
                }
                
                pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
                
                const now = Date.now();
                const idleTime = now * 0.0025 + previewIdleOffset;
                const bouncePhase = Math.abs(Math.sin(idleTime));
                
                const idleBounceY = -Math.pow(bouncePhase, 2) * 5;
                let scaleX = 1;
                let scaleY = 1;
                
                if (bouncePhase < 0.2) {
                    scaleX = 1 + (0.2 - bouncePhase) * 0.8;
                    scaleY = 1 - (0.2 - bouncePhase) * 0.8;
                } else {
                    scaleX = 1 - (bouncePhase - 0.2) * 0.15;
                    scaleY = 1 + (bouncePhase - 0.2) * 0.15;
                }

                const drawX = 16;
                const drawY = 16;
                const bounceY = idleBounceY;
                const color = selectedColor;

                pCtx.save();
                pCtx.fillStyle = 'rgba(0,0,0,0.2)';
                pCtx.beginPath();
                pCtx.ellipse(drawX + PLAYER_SIZE/2, drawY + PLAYER_SIZE, (PLAYER_SIZE/2) * scaleX, 8 * (2 - scaleY), 0, 0, Math.PI*2);
                pCtx.fill();

                pCtx.translate(drawX + PLAYER_SIZE/2, drawY + PLAYER_SIZE + bounceY);
                pCtx.scale(scaleX, scaleY);
                pCtx.translate(-(drawX + PLAYER_SIZE/2), -(drawY + PLAYER_SIZE + bounceY));

                const bodyY = drawY + bounceY;
                pCtx.fillStyle = color;
                if(pCtx.roundRect) {
                    pCtx.beginPath();
                    pCtx.roundRect(drawX, bodyY, PLAYER_SIZE, PLAYER_SIZE, 6);
                    pCtx.fill();
                } else {
                    pCtx.fillRect(drawX, bodyY, PLAYER_SIZE, PLAYER_SIZE);
                }
                
                pCtx.fillStyle = '#2c272e';
                pCtx.fillRect(drawX + 8, bodyY + 12, 4, 6);
                pCtx.fillRect(drawX + PLAYER_SIZE - 12, bodyY + 12, 4, 6);
                
                pCtx.fillStyle = 'rgba(255,100,100,0.4)';
                pCtx.fillRect(drawX + 4, bodyY + 18, 6, 4);
                pCtx.fillRect(drawX + PLAYER_SIZE - 10, bodyY + 18, 6, 4);

                pCtx.restore();
                previewLoopId = requestAnimationFrame(loop);
            }
            loop();
        }

        function getUsername() {
            const val = document.getElementById('username-input').value.trim();
            if (!val) {
                showToast("Please enter a username!");
                return null;
            }
            return val;
        }

        window.createRoom = async () => {
            if (!currentUser) return;
            const username = getUsername();
            if (!username) return;
            
            const btn = document.getElementById('btn-create-room');
            btn.disabled = true;
            const originalText = btn.innerText;
            btn.innerText = "Brewing Table...";
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            updateConnStatus('connecting');

            const code = generateRoomCode();
            const roomRef = getRoomRef(code);
            
            // Spawn at the center
            localPlayer.x = CANVAS_WIDTH / 2 - PLAYER_SIZE / 2;
            localPlayer.y = CANVAS_HEIGHT / 2 - PLAYER_SIZE / 2;
            localPlayer.lastSeen = Date.now();
            localPlayer.username = username;

            const initialData = {
                createdAt: Date.now(),
                players: {
                    [currentUser.uid]: localPlayer
                }
            };

            try {
                await setDoc(roomRef, initialData);
                await joinRoom(code);
            } catch (e) {
                console.error("Error creating room:", e);
                showToast("Error opening table.");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        };

        window.joinRoomFromInput = async () => {
            const code = document.getElementById('join-code').value.toUpperCase().trim();
            if (code.length === 4) {
                const btn = document.getElementById('btn-join-room');
                btn.disabled = true;
                const originalText = btn.innerText;
                btn.innerText = "Joining...";
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                updateConnStatus('connecting');

                await joinRoom(code);

                btn.disabled = false;
                btn.innerText = originalText;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            } else {
                showToast("Enter a valid 4-letter code.");
            }
        };

        async function joinRoom(code) {
            if (!currentUser) return false;
            const username = getUsername();
            if (!username) return false;
            
            const roomRef = getRoomRef(code);

            try {
                const roomSnap = await getDoc(roomRef);
                if (!roomSnap.exists()) {
                    showDialog(`Table "${code}" does not exist or has already been closed.`);
                    return false;
                }

                currentRoom = code;
                document.getElementById('display-room-code').innerText = code;
                
                // Reset local player properties to spawn at the center
                localPlayer.x = CANVAS_WIDTH / 2 - PLAYER_SIZE / 2 + (Math.random() * 40 - 20);
                localPlayer.y = CANVAS_HEIGHT / 2 - PLAYER_SIZE / 2 + (Math.random() * 20 - 10);
                localPlayer.msg = "";
                localPlayer.lastSeen = Date.now();
                localPlayer.username = username;
                
                await updateDoc(roomRef, {
                    [`players.${currentUser.uid}`]: localPlayer
                });

                // Transition UI
                document.getElementById('menu-ui').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                document.getElementById('game-ui').classList.add('flex');

                // Listen for updates
                unsubscribeRoom = onSnapshot(roomRef, (docSnap) => {
                    if (docSnap.exists()) {
                        gameState = docSnap.data();
                        updateOnlineCount();
                    } else {
                        showToast("The host closed this table.");
                        leaveRoom();
                    }
                }, (error) => {
                    console.error("Sync error:", error);
                });

                startGameLoop();
                startNetworkSync();
                initJoystick();
                showToast(`Joined table ${code}!`);

                const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?room=' + code;
                window.history.pushState({path:newUrl},'',newUrl);

                // Focus canvas so we can move immediately
                canvas.focus();
                
                return true;

            } catch (e) {
                console.error("Error joining:", e);
                showToast("Failed to join room.");
                return false;
            }
        }

        function initJoystick() {
            if (nippleManager) return;
            const zone = document.getElementById('joystick-zone');
            if (!zone) return;
            
            // Only init if mobile
            if (window.innerWidth >= 768) return; 

            nippleManager = nipplejs.create({
                zone: zone,
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'white',
                size: 100
            });

            nippleManager.on('move', (evt, data) => {
                if (data.vector) {
                    joystickVector.x = data.vector.x;
                    joystickVector.y = -data.vector.y; // Invert Y
                }
            });
            nippleManager.on('end', () => {
                joystickVector.x = 0;
                joystickVector.y = 0;
            });
        }

        window.leaveRoom = () => {
            if (unsubscribeRoom) unsubscribeRoom();
            if (gameLoopId) cancelAnimationFrame(gameLoopId);
            if (networkSyncId) clearInterval(networkSyncId);
            
            currentRoom = null;
            document.getElementById('menu-ui').classList.remove('hidden');
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('flex');
            
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.pushState({path:newUrl},'',newUrl);
        };

        window.showToast = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = 1;
            toast.style.transform = "translate(-50%, 0)";
            setTimeout(() => {
                toast.style.opacity = 0;
                toast.style.transform = "translate(-50%, -1rem)";
            }, 3000);
        };

        window.showDialog = (msg) => {
            document.getElementById('dialog-msg').innerText = msg;
            document.getElementById('dialog-overlay').classList.remove('hidden');
            document.getElementById('dialog-overlay').classList.add('flex');
        };

        window.closeDialog = () => {
            document.getElementById('dialog-overlay').classList.add('hidden');
            document.getElementById('dialog-overlay').classList.remove('flex');
        };

        window.copyInviteLink = () => {
            const link = window.location.href;
            const textArea = document.createElement("textarea");
            textArea.value = link;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Invite link copied!");
            } catch (err) {
                showToast("Code: " + currentRoom);
            }
            document.body.removeChild(textArea);
        };

        window.updateConnStatus = (status, ping) => {
            const indicator = document.getElementById('conn-indicator');
            const statusText = document.getElementById('conn-status');
            const pingText = document.getElementById('ping-value');

            if (!indicator || !statusText || !pingText) return;

            if (!navigator.onLine || status === 'disconnected') {
                indicator.className = "w-2 h-2 md:w-3 md:h-3 bg-red-500 rounded-full";
                statusText.innerText = "Disconnected";
                pingText.innerText = "Ping: -- ms";
            } else if (status === 'connecting') {
                indicator.className = "w-2 h-2 md:w-3 md:h-3 bg-yellow-400 rounded-full animate-pulse";
                statusText.innerText = "Connecting...";
            } else if (status === 'connected') {
                indicator.className = "w-2 h-2 md:w-3 md:h-3 bg-green-400 rounded-full";
                statusText.innerText = "Connected";
                if (ping !== undefined) pingText.innerText = `Ping: ${ping} ms`;
            }
        };

        window.addEventListener('online', () => { if (currentRoom) updateConnStatus('connected'); });
        window.addEventListener('offline', () => { if (currentRoom) updateConnStatus('disconnected'); });

        function updateOnlineCount() {
            if (!gameState.players) return;
            const now = Date.now();
            let count = 0;
            for (const uid in gameState.players) {
                // Count players seen in the last 15 seconds
                if (now - gameState.players[uid].lastSeen < 15000) {
                    count++;
                }
            }
            document.getElementById('online-count').innerText = `${count} Online`;
        }

        window.handleChatSubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            
            if (msg && currentRoom && currentUser) {
                localPlayer.msg = msg;
                localPlayer.msgTime = Date.now();
                
                try {
                    await updateDoc(getRoomRef(currentRoom), {
                        [`players.${currentUser.uid}.msg`]: msg,
                        [`players.${currentUser.uid}.msgTime`]: localPlayer.msgTime,
                        [`players.${currentUser.uid}.lastSeen`]: Date.now()
                    });
                } catch(err) {
                    console.error("Chat send failed", err);
                }
                input.value = '';
            }
            input.blur();
            window.isTyping = false;
            canvas.focus(); // Return focus to canvas for movement
        };

        window.toggleChat = () => {
            const chatBar = document.getElementById('chat-bar');
            if (chatBar.classList.contains('hidden')) {
                chatBar.classList.remove('hidden');
                chatBar.classList.add('flex');
                document.getElementById('chat-input').focus();
            } else {
                chatBar.classList.add('hidden');
                chatBar.classList.remove('flex');
            }
        };

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            if (window.isTyping) return; // Ignore movement keys if typing
            
            if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key] = true;
                keys[e.key.toLowerCase()] = true;
            }
            
            // Quick focus chat with Enter
            if (e.key === 'Enter' && currentRoom) {
                e.preventDefault();
                const chatBar = document.getElementById('chat-bar');
                if (chatBar.classList.contains('hidden')) {
                    window.toggleChat();
                } else {
                    document.getElementById('chat-input').focus();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key) || keys.hasOwnProperty(e.key.toLowerCase())) {
                keys[e.key] = false;
                keys[e.key.toLowerCase()] = false;
            }
        });

        function updatePhysics() {
            if (window.isTyping) return; // No movement while chatting

            let dx = 0;
            let dy = 0;

            if (keys['ArrowUp'] || keys['w']) dy -= SPEED;
            if (keys['ArrowDown'] || keys['s']) dy += SPEED;
            if (keys['ArrowLeft'] || keys['a']) dx -= SPEED;
            if (keys['ArrowRight'] || keys['d']) dx += SPEED;

            // Apply joystick input if no keyboard input
            if (dx === 0 && dy === 0) {
                dx = joystickVector.x * SPEED;
                dy = joystickVector.y * SPEED;
            } else {
                if (dx !== 0 && dy !== 0) {
                    dx *= 0.707;
                    dy *= 0.707;
                }
            }

            localPlayer.x += dx;
            localPlayer.y += dy;
            localPlayer.vx = dx;
            localPlayer.vy = dy;

            // Simple cafe boundaries (keep them on the rug/floor area mostly)
            // Left/Right bounds
            localPlayer.x = Math.max(20, Math.min(CANVAS_WIDTH - PLAYER_SIZE - 20, localPlayer.x));
            // Top bounds (barista counter) / Bottom bounds
            localPlayer.y = Math.max(120, Math.min(CANVAS_HEIGHT - PLAYER_SIZE - 20, localPlayer.y));
        }

        // Helper for rounded rectangles (if browser support is an issue, but ctx.roundRect is standard now)
        function drawCafeEnvironment() {
            // Background Floor
            ctx.fillStyle = '#dcb897';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Floorboards
            ctx.strokeStyle = '#c49e7b';
            ctx.lineWidth = 2;
            for(let i=0; i<CANVAS_WIDTH; i+=40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, CANVAS_HEIGHT);
                ctx.stroke();
            }

            // Top Wall & Counter
            ctx.fillStyle = '#6a5a65'; // Wall
            ctx.fillRect(0, 0, CANVAS_WIDTH, 80);
            
            // Plants on counter
            ctx.fillStyle = '#506e5e';
            ctx.fillRect(50, 40, 30, 40);
            ctx.fillRect(720, 40, 30, 40);
            ctx.fillStyle = '#8fb3a0';
            ctx.beginPath(); ctx.arc(65, 30, 20, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(735, 30, 20, 0, Math.PI*2); ctx.fill();

            // Main Bar Counter
            ctx.fillStyle = '#8c5d4b';
            ctx.fillRect(0, 80, CANVAS_WIDTH, 50);
            ctx.fillStyle = '#b67d65'; // Counter top highlight
            ctx.fillRect(0, 80, CANVAS_WIDTH, 15);

            // Center Cozy Rug
            ctx.fillStyle = '#c47272';
            ctx.beginPath();
            if(ctx.roundRect) {
                ctx.roundRect(150, 200, 500, 300, 20);
            } else {
                ctx.fillRect(150, 200, 500, 300);
            }
            ctx.fill();
            
            // Rug Fringe
            ctx.strokeStyle = '#e8b19a';
            ctx.lineWidth = 4;
            ctx.setLineDash([8, 8]);
            ctx.strokeRect(154, 204, 492, 292);
            ctx.setLineDash([]);

            // Coffee Tables
            const tables = [[250, 350], [550, 350], [400, 250], [400, 450]];
            tables.forEach(t => {
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.beginPath(); ctx.arc(t[0], t[1] + 10, 40, 0, Math.PI*2); ctx.fill();
                // Wood
                ctx.fillStyle = '#5d4037';
                ctx.beginPath(); ctx.arc(t[0], t[1], 45, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#795548';
                ctx.beginPath(); ctx.arc(t[0], t[1] - 5, 45, 0, Math.PI*2); ctx.fill();
                
                // Little coffee cup
                ctx.fillStyle = '#fff';
                ctx.fillRect(t[0] - 5, t[1] - 15, 10, 12);
            });
        }

        function drawChatBubble(x, y, text) {
            ctx.font = '24px "VT323", monospace';
            const padding = 12;
            const textWidth = ctx.measureText(text).width;
            const bubbleWidth = textWidth + padding * 2;
            const bubbleHeight = 40;
            
            // Position bubble above the player and username, centered
            const bubbleX = x + (PLAYER_SIZE/2) - (bubbleWidth/2);
            const bubbleY = y - bubbleHeight - 48;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath();
            if(ctx.roundRect) {
                ctx.roundRect(bubbleX + 2, bubbleY + 2, bubbleWidth, bubbleHeight, 8);
            } else {
                ctx.fillRect(bubbleX + 2, bubbleY + 2, bubbleWidth, bubbleHeight);
            }
            ctx.fill();

            // Bubble background
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            if(ctx.roundRect) {
                ctx.roundRect(bubbleX, bubbleY, bubbleWidth, bubbleHeight, 8);
            } else {
                ctx.fillRect(bubbleX, bubbleY, bubbleWidth, bubbleHeight);
            }
            ctx.fill();
            
            // Bubble border
            ctx.strokeStyle = '#4a3e47';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Pointer down to player
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(x + PLAYER_SIZE/2 - 6, bubbleY + bubbleHeight - 2);
            ctx.lineTo(x + PLAYER_SIZE/2 + 6, bubbleY + bubbleHeight - 2);
            ctx.lineTo(x + PLAYER_SIZE/2, bubbleY + bubbleHeight + 8);
            ctx.fill();
            
            // Pointer border lines
            ctx.beginPath();
            ctx.moveTo(x + PLAYER_SIZE/2 - 6, bubbleY + bubbleHeight);
            ctx.lineTo(x + PLAYER_SIZE/2, bubbleY + bubbleHeight + 8);
            ctx.lineTo(x + PLAYER_SIZE/2 + 6, bubbleY + bubbleHeight);
            ctx.stroke();

            // Text
            ctx.fillStyle = '#2c272e';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, bubbleX + bubbleWidth/2, bubbleY + bubbleHeight/2 + 2);
            
            // Reset alignment for other drawings
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
        }

        function drawPlayers() {
            const now = Date.now();

            if (gameState.players) {
                for (const [uid, p] of Object.entries(gameState.players)) {
                    // Ignore players inactive for > 15 seconds
                    if (now - p.lastSeen > 15000) continue;

                    const isMe = (uid === currentUser.uid);
                    
                    // Initialize client state for interpolation
                    if (!clientState[uid]) clientState[uid] = { currentX: p.x, currentY: p.y, animOffset: 0, idleOffset: Math.random() * Math.PI * 2 };
                    const cs = clientState[uid];

                    let drawX, drawY, isMoving;

                    if (isMe) {
                        drawX = localPlayer.x;
                        drawY = localPlayer.y;
                        isMoving = Math.abs(localPlayer.vx) > 0.1 || Math.abs(localPlayer.vy) > 0.1;
                    } else {
                        // Smooth local rendering to avoid input lag feel (LERP)
                        cs.currentX += (p.x - cs.currentX) * 0.2;
                        cs.currentY += (p.y - cs.currentY) * 0.2;
                        drawX = cs.currentX;
                        drawY = cs.currentY;
                        isMoving = Math.abs(p.x - cs.currentX) > 1 || Math.abs(p.y - cs.currentY) > 1;
                    }

                    // Update animation offset
                    if (isMoving) cs.animOffset += 0.2;
                    else cs.animOffset = 0;

                    let scaleX = 1;
                    let scaleY = 1;
                    let idleBounceY = 0;

                    if (!isMoving) {
                        const idleTime = now * 0.0025 + cs.idleOffset;
                        const bouncePhase = Math.abs(Math.sin(idleTime));
                        
                        idleBounceY = -Math.pow(bouncePhase, 2) * 5;
                        
                        if (bouncePhase < 0.2) {
                            // Squash hard when hitting the ground
                            scaleX = 1 + (0.2 - bouncePhase) * 0.8;
                            scaleY = 1 - (0.2 - bouncePhase) * 0.8;
                        } else {
                            // Stretch gently while in the air
                            scaleX = 1 - (bouncePhase - 0.2) * 0.15;
                            scaleY = 1 + (bouncePhase - 0.2) * 0.15;
                        }
                    }

                    const wobbleAngle = isMoving ? Math.sin(cs.animOffset) * 0.15 : 0;
                    const bounceY = isMoving ? -Math.abs(Math.sin(cs.animOffset)) * 4 : idleBounceY;

                    const color = isMe ? localPlayer.color : (p.color || '#ffb3ba');
                    const username = isMe ? localPlayer.username : (p.username || 'Guest');

                    // Draw Username above player
                    ctx.font = '22px "VT323", monospace';
                    const nameWidth = ctx.measureText(username).width;
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(drawX + PLAYER_SIZE/2 - nameWidth/2 - 6, drawY + bounceY - 32, nameWidth + 12, 26);
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.fillText(username, drawX + PLAYER_SIZE/2, drawY + bounceY - 12);
                    ctx.textAlign = 'left';

                    // Save context for rotation/bouncing of character
                    ctx.save();
                    
                    // Player Shadow (drawn on the floor, unaffected by bounce, but affected by wobble slightly? Better to keep it completely flat)
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.beginPath();
                    // Shadow scales with the bounce (squash = wider shadow, stretch = narrower shadow)
                    ctx.ellipse(drawX + PLAYER_SIZE/2, drawY + PLAYER_SIZE, (PLAYER_SIZE/2) * scaleX, 8 * (2 - scaleY), 0, 0, Math.PI*2);
                    ctx.fill();

                    // Apply animation transforms to the body (Pivot at feet)
                    ctx.translate(drawX + PLAYER_SIZE/2, drawY + PLAYER_SIZE + bounceY);
                    ctx.rotate(wobbleAngle);
                    ctx.scale(scaleX, scaleY);
                    ctx.translate(-(drawX + PLAYER_SIZE/2), -(drawY + PLAYER_SIZE + bounceY));

                    const bodyY = drawY + bounceY;

                    // Player Body
                    ctx.fillStyle = color;
                    if(ctx.roundRect) {
                        ctx.beginPath();
                        ctx.roundRect(drawX, bodyY, PLAYER_SIZE, PLAYER_SIZE, 6);
                        ctx.fill();
                    } else {
                        ctx.fillRect(drawX, bodyY, PLAYER_SIZE, PLAYER_SIZE);
                    }
                    
                    // Cute face (eyes and blush)
                    ctx.fillStyle = '#2c272e'; // Eyes
                    ctx.fillRect(drawX + 8, bodyY + 12, 4, 6);
                    ctx.fillRect(drawX + PLAYER_SIZE - 12, bodyY + 12, 4, 6);
                    
                    ctx.fillStyle = 'rgba(255,100,100,0.4)'; // Blush
                    ctx.fillRect(drawX + 4, bodyY + 18, 6, 4);
                    ctx.fillRect(drawX + PLAYER_SIZE - 10, bodyY + 18, 6, 4);

                    // Highlight self outline
                    if (isMe) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                        ctx.lineWidth = 2;
                        if(ctx.roundRect) {
                            ctx.beginPath();
                            ctx.roundRect(drawX - 2, bodyY - 2, PLAYER_SIZE + 4, PLAYER_SIZE + 4, 8);
                            ctx.stroke();
                        } else {
                            ctx.strokeRect(drawX - 2, bodyY - 2, PLAYER_SIZE + 4, PLAYER_SIZE + 4);
                        }
                    }

                    ctx.restore();

                    // Draw Chat Bubble (Visible for 6 seconds)
                    const msg = isMe ? localPlayer.msg : p.msg;
                    const msgTime = isMe ? localPlayer.msgTime : p.msgTime;
                    
                    if (msg && msgTime && (now - msgTime < 6000)) {
                        drawChatBubble(drawX, drawY + bounceY, msg);
                    }
                }
            }
        }

        function drawGame() {
            // Resize canvas context internally to maintain aspect ratio
            const displayWidth = canvas.clientWidth;
            const displayHeight = canvas.clientHeight;
            if (canvas.width !== displayWidth || canvas.height !== displayHeight) {
                // In a perfect world we'd resize, but keeping fixed internal resolution 
                // and scaling via CSS is better for retro pixel art consistency.
                // The CSS `object-fit: cover` and `w-full h-full` handles this visually.
            }

            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            drawCafeEnvironment();
            drawPlayers();
        }

        function startGameLoop() {
            function loop() {
                updatePhysics();
                drawGame();
                gameLoopId = requestAnimationFrame(loop);
            }
            loop();
        }

        let isSyncing = false;
        function startNetworkSync() {
            // Push local position & activity ping to Firestore periodically
            networkSyncId = setInterval(async () => {
                if (!currentRoom || !currentUser || isSyncing) return;
                
                if (!navigator.onLine) {
                    updateConnStatus('disconnected');
                    return;
                }

                const roomRef = getRoomRef(currentRoom);
                localPlayer.lastSeen = Date.now();
                const pingStart = Date.now();
                isSyncing = true;

                try {
                    await updateDoc(roomRef, {
                        [`players.${currentUser.uid}.x`]: localPlayer.x,
                        [`players.${currentUser.uid}.y`]: localPlayer.y,
                        [`players.${currentUser.uid}.lastSeen`]: localPlayer.lastSeen,
                        [`players.${currentUser.uid}.username`]: localPlayer.username
                    });
                    const ping = Date.now() - pingStart;
                    updateConnStatus('connected', ping);
                } catch(e) {
                    // Suppress harmless transient network errors in console
                } finally {
                    isSyncing = false;
                }
            }, 100); // 10 ticks per second is generally safe for small firebase lobbies
        }

    </script>
</body>
</html>
